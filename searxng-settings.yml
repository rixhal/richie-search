# ============================================================
# Richie Search — Power-Up Settings (2026-06-03)
# TIER 1-4 komplett: Valkey, use_default_settings, Google/Bing,
# Image Proxy, 16 neue Engines, DOI-Plugin, Metrics, Limiter
# ============================================================

use_default_settings: true

general:
  debug: false
  instance_name: Richie Search
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: true
  open_metrics: 'hermes-search-metrics'

brand:
  docs_url: https://docs.searxng.org/
  public_instances: https://searx.space
  wiki_url: https://github.com/searxng/searxng/wiki
  issue_url: https://github.com/searxng/searxng/issues

search:
  safe_search: 0
  autocomplete: google
  autocomplete_min: 2
  favicon_resolver: google
  default_lang: de
  ban_time_on_fail: 1
  ban_time_on_fail: 1
  suspended_times:
    SearxEngineAccessDenied: 60
    SearxEngineCaptcha: 300
    SearxEngineTooManyRequests: 60
    SearxEngineCaptcha: 300
    SearxEngineAccessDenied: 60
    SearxEngineCaptcha: 300
  formats:
  - html
  - json

server:
  port: 8888
  bind_address: 127.0.0.1
  base_url: https://search.richie.fyi
  limiter: false
  public_instance: false
  secret_key: sKIQsi0aXkdUiMy60Eu2A18Mi4p7YyK
  image_proxy: true
  http_protocol_version: '1.1'
  method: GET
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

valkey:
  url: redis://searxng-valkey:6379/0

ui:
  templates_path: ''
  query_in_title: false
  default_theme: simple
  center_alignment: false
  default_locale: de
  results_on_new_tab: true
  theme_args:
    simple_style: auto
  search_on_category_select: true
  hotkeys: vim
  url_formatting: full

outgoing:
  request_timeout: 4.0
  max_request_timeout: 9.0
  useragent_suffix: ''
  pool_connections: 150
  pool_maxsize: 30
  enable_http2: true

plugins:
  searx.plugins.calculator.SXNGPlugin:
    active: true
  searx.plugins.infinite_scroll.SXNGPlugin:
    active: true
  searx.plugins.hash_plugin.SXNGPlugin:
    active: true
  searx.plugins.self_info.SXNGPlugin:
    active: true
  searx.plugins.unit_converter.SXNGPlugin:
    active: true
  searx.plugins.ahmia_filter.SXNGPlugin:
    active: true
  searx.plugins.hostnames.SXNGPlugin:
    active: true
  searx.plugins.time_zone.SXNGPlugin:
    active: true
  searx.plugins.tracker_url_remover.SXNGPlugin:
    active: true
  searx.plugins.url_rewrite.SXNGPlugin:
    active: true
  searx.plugins.oa_doi_rewrite.SXNGPlugin:
    active: true
  searx.plugins.tor_check.SXNGPlugin:
    active: true

categories_as_tabs:
  general: null
  images: null
  videos: null
  news: null
  map: null
  music: null
  it: null
  science: null
