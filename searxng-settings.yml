doi_resolvers:
  oadoi.org: https://oadoi.org/
  doi.org: https://doi.org/
  sci-hub.se: https://sci-hub.se/
  sci-hub.st: https://sci-hub.st/
  sci-hub.ru: https://sci-hub.ru/
default_doi_resolver: oadoi.org

url_rewrite:
  rules:
  - pattern: ^https?://(?:www\.)?facebook\.com/.*
    repl: false
  - pattern: ^https?://(?:www\.)?instagram\.com/.*
    repl: false
  - pattern: ^https?://(?:www\.)?tiktok\.com/.*
    repl: false
  - pattern: ^https?://(?:www\.)?reddit\.com(?P<path>/.*)?$
    repl: https://old.reddit.com\g<path>
  - pattern: ^https?://(?:www\.)?medium\.com(?P<path>/.*)?$
    repl: https://freedium.cfd\g<path>
  - pattern: ^(?P<url>https://(?:.*\.)?wikipedia\.org/.*)$
    repl: \g<url>
    priority: high
    replace_url: false
  - pattern: ^(?P<url>https://(?:.*\.)?stackoverflow\.com/.*)$
    repl: \g<url>
    priority: high
    replace_url: false
  - pattern: ^(?P<url>https://(?:.*\.)?github\.com/.*)$
    repl: \g<url>
    priority: high
    replace_url: false
