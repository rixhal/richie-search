<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0a0a0a">
<meta name="color-scheme" content="dark">
<title>Richie Search</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23e33'/><text x='16' y='24' text-anchor='middle' font-family='system-ui' font-weight='700' font-size='22' fill='%230a0a0a'>R</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-hover: #1a1a1a;
    --border: rgba(255,255,255,0.06);
    --text: #e0e0e0;
    --text-muted: #999;
    --accent: #ff2d2d;
    --accent-glow: rgba(255,45,45,0.15);
    --brand: #ff2d2d;
    --radius: 4px;
    --transition: 150ms cubic-bezier(0.4,0,0.2,1);
  }

  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

  body {
    background: var(--bg);
    color: #fff;
    font-family: 'DM Sans', -apple-system, sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 720px;
    padding: 0 20px;
    margin-top: 15vh;
    transition: margin 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  .container.has-results { margin-top: 2rem; }
  .container.media-grid { max-width: 960px; }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.6s ease-out forwards;
    user-select: none;
  }

  .logo-mark {
    width: 44px;
    height: 44px;
    background: var(--brand);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    color: #0a0a0a;
    box-shadow: 0 0 24px var(--accent-glow);
  }

  .logo-text {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #fff;
  }

  .logo-text span { color: #ccc; font-weight: 400; }

  .search-wrapper {
    position: relative;
    opacity: 0;
    animation: fadeUp 0.6s 0.1s ease-out forwards;
  }

  .search-bar {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    transition: border-color var(--transition), box-shadow var(--transition);
  }

  .search-bar:focus-within {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .search-bar.has-suggestions { border-radius: 12px 12px 0 0; }

  .search-input {
    flex: 1;
    background: none;
    border: none;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    padding: 14px 16px;
    outline: none;
    min-width: 0;
  }

  .search-input::placeholder { color: #ccc; }

  .search-btn {
    background: var(--brand);
    border: none;
    color: #0a0a0a;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: filter var(--transition);
    white-space: nowrap;
  }

  .search-btn:hover { filter: brightness(1.2); }
  .search-btn:active { filter: brightness(0.9); }
  .search-btn:disabled { opacity: 0.5; cursor: wait; }

  /* ========== AUTOCOMPLETE ========== */
  .suggestions {
    display: none;
    position: absolute;
    top: calc(100% - 1px);
    left: 0;
    right: 0;
    background: var(--surface);
    border: 1px solid var(--brand);
    border-top: 1px solid var(--border);
    border-radius: 0 0 10px 10px;
    max-height: 196px;
    overflow-y: auto;
    z-index: 1000;
    box-shadow: 0 12px 40px rgba(0,0,0,0.7), 0 0 0 3px var(--accent-glow);
  }

  .suggestions.visible { display: block; }

  .suggestion-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 18px;
    font-size: 15px;
    color: var(--text);
    cursor: pointer;
    transition: background var(--transition), color var(--transition);
    border-bottom: 1px solid var(--border);
  }

  .suggestion-item:last-child { border-bottom: none; }

  .suggestion-item:hover,
  .suggestion-item.active {
    background: var(--surface-hover);
    color: var(--brand);
  }

  .suggestion-item .s-icon { font-size: 13px; opacity: 0.5; flex-shrink: 0; width: 16px; text-align: center; color: var(--text-muted); }
  .suggestion-item .s-text { flex: 1; word-break: break-word; }
  .suggestion-item .s-fill { display: none; }

  .search-wrapper:has(.suggestions.visible) ~ .categories {
    margin-top: 208px;
  }

  /* ========== CATEGORY TABS ========== */
  .categories {
    display: flex;
    gap: 4px;
    margin-top: 12px;
    opacity: 0;
    animation: fadeUp 0.6s 0.15s ease-out forwards;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 4px;
  }

  .categories::-webkit-scrollbar { display:none; }

  .cat-btn {
    background: none;
    border: 1px solid transparent;
    color: #ccc;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .cat-btn:hover { color: #fff; background: var(--surface); }
  .cat-btn.active { color: var(--brand); border-color: var(--brand); background: var(--accent-glow); }

  .time-filter {
    display: flex;
    align-items: center;
    margin-left: auto;
    gap: 6px;
  }

  .time-filter label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .time-filter select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 5px 8px;
    border-radius: 4px;
    cursor: pointer;
    outline: none;
  }

  .time-filter select:focus { border-color: var(--brand); }

  /* ========== RESULTS: Web ========== */
  .results {
    margin-top: 2rem;
    display: none;
    flex-direction: column;
    gap: 2px;
  }

  .results.visible { display: flex; }

  .result-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    transition: background var(--transition), border-color var(--transition);
    animation: fadeUp 0.3s ease-out forwards;
    opacity: 0;
    cursor: pointer;
  }

  .result-item:hover {
    background: #1e1e1e;
    border-color: var(--brand);
    border-left: 3px solid var(--brand);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }

  .result-item:nth-child(1) { animation-delay: 0.05s; }
  .result-item:nth-child(2) { animation-delay: 0.1s; }
  .result-item:nth-child(3) { animation-delay: 0.15s; }
  .result-item:nth-child(4) { animation-delay: 0.2s; }
  .result-item:nth-child(5) { animation-delay: 0.25s; }
  .result-item:nth-child(6) { animation-delay: 0.3s; }
  .result-item:nth-child(7) { animation-delay: 0.35s; }
  .result-item:nth-child(8) { animation-delay: 0.4s; }

  .result-title {
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 4px;
    line-height: 1.35;
    text-decoration: none;
    display: block;
  }

  .result-title:hover { color: var(--brand); }

  .result-url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--brand);
    margin-bottom: 6px;
    word-break: break-all;
  }

  .result-meta {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }

  .result-date {
    color: var(--brand);
    opacity: 0.8;
  }

  .result-engine {
    color: var(--text-muted);
    opacity: 0.5;
  }

  .result-snippet {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ========== RESULTS: Images Grid ========== */
  .results-grid {
    display: none;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 2px;
    margin-top: 2rem;
  }

  .results-grid.visible { display: grid; }

  .img-card {
    position: relative;
    aspect-ratio: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color var(--transition), transform var(--transition);
    animation: fadeUp 0.3s ease-out forwards;
    opacity: 0;
  }

  .img-card:hover {
    border-color: var(--brand);
    transform: scale(1.02);
    z-index: 2;
  }

  .img-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .img-card .img-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 8px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    opacity: 0;
    transition: opacity var(--transition);
  }

  .img-card:hover .img-overlay { opacity: 1; }

  .img-card .img-title {
    font-size: 11px;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  /* ========== RESULTS: Videos ========== */
  .results-videos {
    display: none;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 8px;
    margin-top: 2rem;
  }

  .results-videos.visible { display: grid; }

  .video-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color var(--transition), background var(--transition);
    animation: fadeUp 0.3s ease-out forwards;
    opacity: 0;
  }

  .video-card:hover {
    border-color: var(--brand);
    background: var(--accent);
  }

  .video-thumb {
    position: relative;
    aspect-ratio: 16/9;
    background: #000;
    overflow: hidden;
  }

  .video-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .video-thumb .video-duration {
    position: absolute;
    bottom: 6px;
    right: 6px;
    background: rgba(0,0,0,0.85);
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 3px;
  }

  .video-thumb .video-play {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.3);
    opacity: 0;
    transition: opacity var(--transition);
  }

  .video-card:hover .video-play { opacity: 1; }

  .video-play-icon {
    width: 48px;
    height: 48px;
    background: var(--brand);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #0a0a0a;
  }

  .video-info {
    padding: 12px 14px;
  }

  .video-title {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 4px;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .video-meta {
    font-size: 12px;
    color: #ccc;
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .video-meta span { display: flex; align-items: center; gap: 4px; }

  /* ========== STATES ========== */
  .loading {
    display: none;
    justify-content: center;
    padding: 3rem;
  }

  .loading.visible { display: flex; }

  .loader {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--brand);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  .error-state {
    display: none;
    text-align: center;
    padding: 2rem;
    color: #ccc;
    font-size: 14px;
  }

  .error-state.visible { display: block; }

  .empty-state {
    display: none;
    text-align: center;
    padding: 3rem;
    color: #ccc;
  }

  .empty-state.visible { display: block; }

  .empty-state-icon {
    font-size: 48px;
    margin-bottom: 1rem;
    opacity: 0.3;
  }

  .result-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #ccc;
    margin-top: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    display: none;
  }

  .result-count.visible { display: block; }

  .load-more {
    display: none;
    width: 100%;
    padding: 12px;
    margin-top: 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: background var(--transition);
  }
  .load-more:hover { background: var(--surface-hover); }
  .load-more:disabled { opacity: 0.4; cursor: wait; }
  .load-more.visible { display: block; }

  /* ========== FOOTER ========== */
  .footer {
    margin-top: auto;
    padding: 2rem;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #ccc;
    opacity: 0;
    animation: fadeUp 0.6s 0.3s ease-out forwards;
  }

  .footer a { color: #ccc; text-decoration: none; }
  .footer a:hover { color: var(--brand); }

  /* ========== NEWS FILTER ========== */
  .news-filter {
    display: flex;
    gap: 8px;
    margin-top: 0.5rem;
    padding: 0 4px;
    align-items: center;
  }
  .news-filter input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: #ccc;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
  }
  .news-filter input:focus { border-color: var(--brand); }
  .filter-btn {
    background: var(--brand);
    border: none;
    color: #0a0a0a;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(8px); }
    to { opacity:1; transform:translateY(0); }
  }

  @keyframes spin {
    to { transform:rotate(360deg); }
  }

  @media (max-width: 500px) {
    .container { margin-top: 10vh; padding:0 16px; }
    .container.has-results { margin-top: 1rem; }
    .logo-mark { width:38px; height:38px; font-size:22px; border-radius:8px; }
    .logo-text { font-size:18px; }
    .search-input { font-size:16px; padding:12px; }
    .search-btn { padding:10px 16px; font-size:13px; }
    .result-item { padding:14px 16px; }
    .result-title { font-size:15px; }
    .suggestion-item { padding:10px 14px; font-size:14px; }
    .results-grid { grid-template-columns: repeat(2, 1fr); }
    .results-videos { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<main class="container" id="app">
  <div class="logo">
    <div class="logo-mark">R</div>
    <div class="logo-text">Richie <span>Search</span></div>
  </div>

  <div class="search-wrapper" id="searchWrapper">
    <form class="search-bar" id="searchForm" autocomplete="off">
      <input class="search-input" id="searchInput" type="text" name="q"
        placeholder="Suchen…" autofocus spellcheck="false" autocomplete="off">
      <button class="search-btn" type="submit" id="searchBtn">→</button>
    </form>
    <div class="suggestions" id="suggestions" role="listbox" aria-label="Suchvorschläge"></div>
  </div>

  <nav class="categories" id="categoriesNav" aria-label="Suchkategorien">
    <button class="cat-btn active" data-cat="general">Alles</button>
    <button class="cat-btn" data-cat="images">Bilder</button>
    <button class="cat-btn" data-cat="videos">Videos</button>
    <button class="cat-btn" data-cat="news">News</button>
    <button class="cat-btn" data-cat="it">Tech</button>
    <button class="cat-btn" data-cat="science">Science</button>
    <button class="cat-btn" data-cat="music">Musik</button>
    <button class="cat-btn" data-cat="files">Files</button>
    <button class="cat-btn" data-cat="social+media">Social</button>
    <button class="cat-btn" data-cat="map">Map</button>
    <div class="time-filter">
      <select id="timeRange" aria-label="Zeitraum">
        <option value="">Alle</option>
        <option value="day">24h</option>
        <option value="week">Woche</option>
        <option value="month">Monat</option>
        <option value="year">Jahr</option>
      </select>
    </div>
  </nav>
  <div class="news-filter" id="newsFilter" style="display:none">
    <input type="text" id="filterInput" placeholder="Wörter filtern (Komma-getrennt)…" autocomplete="off">
    <button id="filterSave" class="filter-btn">✓</button>
  </div>

  <div class="result-count" id="resultCount" role="status" aria-live="polite"></div>
  <div class="loading" id="loading" role="status" aria-live="polite" aria-busy="true"><div class="loader"></div></div>
  <div class="error-state" id="error" role="alert" aria-live="assertive"></div>
  <div class="empty-state" id="empty">
    <div class="empty-state-icon">⌕</div>
    <div>Keine Ergebnisse gefunden</div>
  </div>
  <div class="results" id="results" role="region" aria-live="polite" aria-label="Suchergebnisse"></div>
  <div class="results-grid" id="resultsGrid"></div>
  <div class="results-videos" id="resultsVideos"></div>
  <button class="load-more" id="loadMore" onclick="loadMoreResults()">Mehr laden</button>
</main>

<footer class="footer" role="contentinfo">
  <a href="https://richie.fyi">richie.fyi</a> ·
  powered by <a href="https://github.com/searxng/searxng">SearXNG</a>
</footer>

<script>
const app = document.getElementById('app');
const form = document.getElementById('searchForm');
const input = document.getElementById('searchInput');
const btn = document.getElementById('searchBtn');
const results = document.getElementById('results');
const resultsGrid = document.getElementById('resultsGrid');
const resultsVideos = document.getElementById('resultsVideos');
const resultCount = document.getElementById('resultCount');
const loading = document.getElementById('loading');
const errorEl = document.getElementById('error');
const empty = document.getElementById('empty');
const suggestions = document.getElementById('suggestions');
const searchBar = document.querySelector('.search-bar');
const searchParams = new URLSearchParams(window.location.search);
let currentCat = 'general';
let activeIndex = -1;
let suggestionData = [];
let autocompleteTimer = null;
let currentPage = 1;
let lastQuery = '';
let abortController = null;
const loadMoreBtn = document.getElementById('loadMore');

// Init from URL
if (searchParams.has('q')) {
  input.value = searchParams.get('q');
  currentCat = searchParams.get('categories') || 'general';
  doSearch();
}

// Category tabs
document.querySelectorAll('.cat-btn').forEach(b => {
  if (b.dataset.cat === currentCat) b.classList.add('active');
  b.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentCat = b.dataset.cat;
    // Show news filter for news category
    const nf = document.getElementById('newsFilter');
    nf.style.display = currentCat === 'news' ? 'flex' : 'none';
    // Default to "day" for news
    if (currentCat === 'news') {
      const tr = document.getElementById('timeRange');
      if (tr && !tr.value) tr.value = 'day';
    }
    if (input.value.trim()) doSearch();
  });
});

// Init news filter on load
(function initNewsFilter() {
  const nf = document.getElementById('newsFilter');
  const fi = document.getElementById('filterInput');
  const fs = document.getElementById('filterSave');
  if (currentCat === 'news') nf.style.display = 'flex';
  // Load saved filter
  fi.value = localStorage.getItem('newsFilter') || '';
  fs.addEventListener('click', () => {
    localStorage.setItem('newsFilter', fi.value.trim());
    if (input.value.trim() && currentCat === 'news') doSearch();
  });
  fi.addEventListener('keydown', e => {
    if (e.key === 'Enter') { fs.click(); e.preventDefault(); }
  });
})();

// Time range change re-triggers search
document.getElementById('timeRange').addEventListener('change', () => {
  if (input.value.trim()) doSearch();
});

// Search form — handle !bangs and normal search
form.addEventListener('submit', e => {
  e.preventDefault();
  closeSuggestions();
  const q = input.value.trim();
  if (!q) return;

  // !bang shortcuts — redirect to target search engine
  const bangs = {
    '!yt':   q => `https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`,
    '!gh':   q => `https://github.com/search?q=${encodeURIComponent(q)}`,
    '!wiki': q => `https://de.wikipedia.org/wiki/${encodeURIComponent(q.replace(/ /g,'_'))}`,
    '!ddg':  q => `https://duckduckgo.com/?q=${encodeURIComponent(q)}`,
    '!px':   q => `https://www.perplexity.ai/?q=${encodeURIComponent(q)}`,
    '!map':  q => `https://www.openstreetmap.org/search?query=${encodeURIComponent(q)}`,
    '!npm':  q => `https://www.npmjs.com/search?q=${encodeURIComponent(q)}`,
    '!py':   q => `https://pypi.org/search/?q=${encodeURIComponent(q)}`,
    '!so':   q => `https://stackoverflow.com/search?q=${encodeURIComponent(q)}`,
    '!img':  q => `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(q)}`,
  };

  const match = q.match(/^!(\w+)\s+(.*)/);
  if (match) {
    const [_, bang, rest] = match;
    const fn = bangs['!' + bang];
    if (fn && rest) { window.location.href = fn(rest); return; }
  }

  doSearch();
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== input) {
    e.preventDefault();
    input.focus();
  }
});

// Input: autocomplete
input.addEventListener('input', () => {
  const q = input.value.trim();
  if (q.length < 2) { closeSuggestions(); return; }
  clearTimeout(autocompleteTimer);
  autocompleteTimer = setTimeout(() => fetchSuggestions(q), 150);
});

input.addEventListener('keydown', e => {
  const items = suggestions.querySelectorAll('.suggestion-item');
  if (!suggestions.classList.contains('visible')) {
    if (e.key === 'Escape') input.blur();
    return;
  }

  switch (e.key) {
    case 'ArrowDown':
      e.preventDefault();
      activeIndex = Math.min(activeIndex + 1, items.length - 1);
      updateActive(items);
      break;
    case 'ArrowUp':
      e.preventDefault();
      activeIndex = Math.max(activeIndex - 1, -1);
      updateActive(items);
      break;
    case 'Enter':
      e.preventDefault();
      if (activeIndex >= 0 && suggestionData[activeIndex]) {
        input.value = suggestionData[activeIndex];
        closeSuggestions();
        doSearch();
      }
      break;
    case 'Escape':
      closeSuggestions();
      break;
  }
});

input.addEventListener('blur', () => {
  setTimeout(closeSuggestions, 150);
});

function updateActive(items) {
  items.forEach((item, i) => {
    item.classList.toggle('active', i === activeIndex);
  });
}

async function fetchSuggestions(q) {
  try {
    const resp = await fetch(`/api/autocompleter?q=${encodeURIComponent(q)}`);
    if (!resp.ok) return;
    const data = await resp.json();
    suggestionData = (Array.isArray(data) && data.length === 2 && Array.isArray(data[1])) ? data[1] : data;
    if (!suggestionData || suggestionData.length === 0) { closeSuggestions(); return; }

    activeIndex = -1;
    suggestions.innerHTML = suggestionData.map((s, i) =>
      `<div class="suggestion-item" role="option" data-idx="${i}">
        <span class="s-icon">↗</span>
        <span class="s-text">${escapeHTML(s)}</span>
        
      </div>`
    ).join('');

    suggestions.classList.add('visible');
    searchBar.classList.add('has-suggestions');
    input.setAttribute('aria-expanded', 'true');

    suggestions.querySelectorAll('.suggestion-item').forEach(item => {
      item.addEventListener('mousedown', e => {
        e.preventDefault();
        const idx = parseInt(item.dataset.idx);
        if (suggestionData[idx]) {
          input.value = suggestionData[idx];
          closeSuggestions();
          doSearch();
        }
      });
    });
  } catch (err) {}
}

function closeSuggestions() {
  suggestions.classList.remove('visible');
  searchBar.classList.remove('has-suggestions');
  input.setAttribute('aria-expanded', 'false');
  suggestions.innerHTML = '';
  suggestionData = [];
  activeIndex = -1;
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatDuration(secs) {
  if (!secs) return '';
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  return `${m}:${String(s).padStart(2, '0')}`;
}

function formatViews(n) {
  if (!n) return '';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toString();
}

function clearResults() {
  results.classList.remove('visible');
  results.innerHTML = '';
  resultsGrid.classList.remove('visible');
  resultsGrid.innerHTML = '';
  resultsVideos.classList.remove('visible');
  resultsVideos.innerHTML = '';
  resultCount.classList.remove('visible');
  app.classList.remove('media-grid');
  errorEl.classList.remove('visible');
  empty.classList.remove('visible');
}

async function doSearch(page = 1) {
  const query = input.value.trim();
  if (!query) return;
  closeSuggestions();

  // Abort previous request
  if (abortController) abortController.abort();
  abortController = new AbortController();
  const signal = abortController.signal;

  if (page === 1) {
    // New search — reset
    currentPage = 1;
    lastQuery = query;
    const url = new URL(window.location);
    url.searchParams.set('q', query);
    if (currentCat !== 'general') url.searchParams.set('categories', currentCat);
    window.history.replaceState({}, '', url);
    app.classList.add('has-results');
    clearResults();
  }

  loadMoreBtn.classList.remove('visible');
  loading.classList.add('visible');
  btn.disabled = true;

  try {
    let apiUrl = `/api/search?q=${encodeURIComponent(query)}&format=json&categories=${currentCat}&language=de&pageno=${page}`;
    // News: use tagesschau exclusively (has actual dates, current German news)
    if (currentCat === 'news') apiUrl += '&engines=tagesschau';
    const tr = document.getElementById('timeRange');
    if (tr && tr.value && currentCat !== 'news') apiUrl += `&time_range=${tr.value}`;

    const timeoutId = setTimeout(() => abortController.abort(), 10000);
    const resp = await fetch(apiUrl, { signal });
    clearTimeout(timeoutId);

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const data = await resp.json();
    loading.classList.remove('visible');
    btn.disabled = false;

    if (!data.results || data.results.length === 0) {
      if (page === 1) empty.classList.add('visible');
      loadMoreBtn.classList.remove('visible');
      return;
    }

    // Sort: newest publishedDate first, no-date to end
    data.results.sort((a, b) => {
      const da = a.publishedDate ? new Date(a.publishedDate).getTime() : 0;
      const db = b.publishedDate ? new Date(b.publishedDate).getTime() : 0;
      if (!a.publishedDate && !b.publishedDate) return 0;
      if (!a.publishedDate) return 1;
      if (!b.publishedDate) return -1;
      return db - da;
    });

    // Apply news filter
    if (currentCat === 'news') {
      const raw = (localStorage.getItem('newsFilter') || '').trim();
      if (raw) {
        const words = raw.split(',').map(w => w.trim().toLowerCase()).filter(Boolean);
        data.results = data.results.filter(r =>
          !words.some(w => (r.title || '').toLowerCase().includes(w))
        );
      }
    }

    const total = page === 1 ? data.results.length : (parseInt(resultCount.textContent) || 0) + data.results.length;
    resultCount.textContent = `${total} Ergebnisse`;
    resultCount.classList.add('visible');

    // Show load more if results returned
    if (data.results.length >= 10) {
      loadMoreBtn.classList.add('visible');
    }

    const isImages = currentCat === 'images';
    const isVideos = currentCat === 'videos';

    if (isImages) {
      app.classList.add('media-grid');
      renderImages(data.results);
    } else if (isVideos) {
      app.classList.add('media-grid');
      renderVideos(data.results);
    } else {
      renderWeb(data.results);
    }
  } catch (err) {
    if (err.name === 'AbortError') {
      errorEl.textContent = 'Zeitüberschreitung — erneut versuchen?';
    } else {
      errorEl.textContent = `Fehler: ${err.message}`;
    }
    errorEl.classList.add('visible');
    loading.classList.remove('visible');
    btn.disabled = false;
    // Retry button
    errorEl.onclick = () => { errorEl.classList.remove('visible'); doSearch(page); };
    errorEl.style.cursor = 'pointer';
    errorEl.title = 'Klicken zum Wiederholen';
  }
}

async function loadMoreResults() {
  currentPage++;
  loadMoreBtn.disabled = true;
  loadMoreBtn.textContent = 'Lädt…';
  await doSearch(currentPage);
  loadMoreBtn.disabled = false;
  loadMoreBtn.textContent = 'Mehr laden';
}

function renderWeb(items) {
  results.classList.add('visible');
  items.forEach(r => {
    const item = document.createElement('div');
    item.className = 'result-item';
    item.onclick = () => window.open(r.url, '_blank');

    const title = document.createElement('a');
    title.className = 'result-title';
    title.href = r.url;
    title.target = '_blank';
    title.textContent = r.title || 'Ohne Titel';

    const urlEl = document.createElement('div');
    urlEl.className = 'result-url';
    try { urlEl.textContent = new URL(r.url).hostname + new URL(r.url).pathname.slice(0,40); }
    catch { urlEl.textContent = r.url; }

    const metaRow = document.createElement('div');
    metaRow.className = 'result-meta';

    if (r.publishedDate) {
      const dateEl = document.createElement('span');
      dateEl.className = 'result-date';
      try {
        const d = new Date(r.publishedDate);
        dateEl.textContent = d.toLocaleDateString('de-DE', {day:'numeric',month:'short',year:'numeric'});
      } catch { dateEl.textContent = r.publishedDate; }
      metaRow.appendChild(dateEl);
    }

    if (r.engine) {
      const engineEl = document.createElement('span');
      engineEl.className = 'result-engine';
      engineEl.textContent = r.engine;
      metaRow.appendChild(engineEl);
    }

    const snippet = document.createElement('div');
    snippet.className = 'result-snippet';
    snippet.textContent = r.content || '';

    item.append(title, urlEl, metaRow, snippet);
    results.appendChild(item);
  });
}

function renderImages(items) {
  resultsGrid.classList.add('visible');
  items.forEach((r, i) => {
    const src = r.img_src || r.thumbnail || '';
    if (!src) return;

    const card = document.createElement('div');
    card.className = 'img-card';
    card.style.animationDelay = `${i * 0.03}s`;
    card.onclick = () => window.open(r.url, '_blank');

    const img = document.createElement('img');
    img.src = src;
    img.alt = r.title || '';
    img.loading = i < 12 ? 'eager' : 'lazy';

    const overlay = document.createElement('div');
    overlay.className = 'img-overlay';

    const imgTitle = document.createElement('div');
    imgTitle.className = 'img-title';
    imgTitle.textContent = r.title || '';

    overlay.appendChild(imgTitle);
    card.append(img, overlay);
    resultsGrid.appendChild(card);
  });
}

function renderVideos(items) {
  resultsVideos.classList.add('visible');
  items.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'video-card';
    card.style.animationDelay = `${i * 0.04}s`;
    card.onclick = () => window.open(r.url, '_blank');

    // Thumbnail
    const thumb = document.createElement('div');
    thumb.className = 'video-thumb';

    if (r.thumbnail) {
      const img = document.createElement('img');
      img.src = r.thumbnail;
      img.alt = r.title || '';
      img.loading = 'lazy';
      thumb.appendChild(img);
    }

    if (r.length) {
      const dur = document.createElement('div');
      dur.className = 'video-duration';
      dur.textContent = formatDuration(r.length);
      thumb.appendChild(dur);
    }

    const play = document.createElement('div');
    play.className = 'video-play';
    play.innerHTML = '<div class="video-play-icon">▶</div>';
    thumb.appendChild(play);

    // Info
    const info = document.createElement('div');
    info.className = 'video-info';

    const title = document.createElement('div');
    title.className = 'video-title';
    title.textContent = r.title || 'Ohne Titel';

    const meta = document.createElement('div');
    meta.className = 'video-meta';

    if (r.author) {
      const author = document.createElement('span');
      author.textContent = r.author;
      meta.appendChild(author);
    }

    if (r.views) {
      const views = document.createElement('span');
      views.textContent = formatViews(r.views) + ' Aufrufe';
      meta.appendChild(views);
    }

    info.append(title, meta);
    card.append(thumb, info);
    resultsVideos.appendChild(card);
  });
}
</script>
